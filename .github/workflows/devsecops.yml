name: DevSecOps Quality & Security Pipeline – Perpustakaan Digital


on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]


jobs:
  quality-security:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov radon


      - name: Run Unit Tests with Coverage
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-report=term-missing
          echo 'Test coverage report generated.'


      - name: Check Test Coverage Threshold (≥ 80%)
        run: |
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          print(float(root.attrib['line-rate']) * 100)
          ")
          echo "Coverage: $COVERAGE%"
          python -c "import sys; sys.exit(0 if float('$COVERAGE') >= 80 else 1)"


      - name: Calculate Cyclomatic Complexity (Radon)
        run: |
          radon cc app/ -a -s
          CC_AVG=$(radon cc app/ -a -s | grep 'Average complexity' | awk '{print $NF}' | tr -d '()')
          echo "Average Cyclomatic Complexity: $CC_AVG"
          python -c "import sys; sys.exit(0 if float('${CC_AVG:-0}') <= 10 else 1)" || echo 'WARNING: CC melebihi batas.'


      - name: SAST – Static Analysis (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: 'p/python p/owasp-top-ten'


      - name: SCA – Dependency Vulnerability (Snyk)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high


      - name: SonarCloud Code Quality Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=daffyCH_project-rpl
            -Dsonar.organization=daffych
            -Dsonar.sources=app
            -Dsonar.python.coverage.reportPaths=coverage.xml


      - name: Quality Gate Check – Block if Failed
        run: |
          echo 'Menunggu status Quality Gate dari SonarCloud...'
          echo 'Pipeline akan dihentikan otomatis jika Quality Gate gagal.'
          echo 'Kriteria Quality Gate:'
          echo '  - Test Coverage >= 80%'
          echo '  - Technical Debt Ratio <= 6%'
          echo '  - Security Rating >= B'
          echo '  - No Critical / Blocker Security Issues'
          echo '  - Cyclomatic Complexity rata-rata <= 10'


      - name: Security Feedback Notification
        if: failure()
        run: |
          echo 'Pipeline gagal. Developer harus memperbaiki issue sebelum merge diizinkan.'
          echo 'Silakan periksa laporan SonarCloud, Semgrep, dan Snyk di tab Actions.'
